<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚓ SkipperQuiz — ניהול שאלות</title>
<style>
:root {
  --bg: #0a1628; --bg2: #0f1f3d; --bg3: #152848;
  --accent: #7eb8f7; --green: #3ddc84; --orange: #f5a623;
  --red: #e85d5d; --border: #1e3a6e; --text: #e8f0fe; --dim: #7a9cc8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; direction: rtl; }

header { background: #081228; border-bottom: 2px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 17px; color: var(--accent); font-weight: 800; }
.hright { margin-right: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.btn { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; font-family: inherit; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #081228; }
.btn-ghost { background: transparent; color: var(--dim); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-green { background: var(--green); color: #081228; }
.btn-orange { background: rgba(245,166,35,0.15); color: var(--orange); border: 1px solid rgba(245,166,35,0.4); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-render { background: rgba(126,184,247,0.12); color: var(--accent); border: 1px solid rgba(126,184,247,0.3); }
.btn-render:hover { background: rgba(126,184,247,0.22); }
.btn-publish { background: rgba(61,220,132,0.15); color: var(--green); border: 1px solid rgba(61,220,132,0.4); }
.btn-publish:hover { background: rgba(61,220,132,0.25); }

/* Config row */
.cfg-row { padding: 8px 20px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
.cfg-row input { padding: 5px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: monospace; direction: ltr; }
.cfg-row input:focus { outline: none; border-color: var(--accent); }
.cfg-row .ok { color: var(--green); }
.cfg-row .err { color: var(--red); }

/* Filters */
.filters { padding: 10px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.filters input { flex: 1; min-width: 180px; padding: 7px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; direction: rtl; }
.filters input:focus { outline: none; border-color: var(--accent); }
.filter-btn { padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; font-size: 12px; font-family: inherit; }
.filter-btn.active { background: var(--accent); color: #081228; border-color: var(--accent); font-weight: 700; }

/* Stats bar */
.stats { padding: 6px 20px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; gap: 16px; font-size: 12px; color: var(--dim); }
.stat-val { color: var(--text); font-weight: 700; }

/* List */
#q-list { padding: 10px 20px 80px; }

/* Question card */
.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; }
.q-card:hover { border-color: rgba(126,184,247,0.4); }
.q-card.rendering { border-color: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

.q-meta { display: flex; flex-direction: column; gap: 3px; }
.q-num-badge { font-size: 11px; background: var(--bg3); color: var(--accent); padding: 2px 8px; border-radius: 5px; font-weight: 700; display: inline-block; }
.q-topic-tag { font-size: 11px; color: var(--dim); }
.q-text { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); }
.q-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

.q-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; min-width: 100px; }
.vid-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; white-space: nowrap; }
.vid-badge.has { background: rgba(61,220,132,0.15); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
.vid-badge.none { background: rgba(122,156,200,0.1); color: var(--dim); border: 1px solid var(--border); }
.vid-badge.published { background: rgba(61,220,132,0.25); color: var(--green); border: 1px solid var(--green); }

.q-btns { display: flex; gap: 5px; }

/* Render progress inline */
.render-progress { font-size: 11px; color: var(--accent); text-align: right; min-height: 16px; }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e3a6e; color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 13px; z-index: 999; display: none; border: 1px solid var(--accent); white-space: nowrap; }
.toast.on { display: block; }

/* Bottom bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #081228; border-top: 2px solid var(--border); padding: 8px 20px; display: flex; gap: 10px; align-items: center; z-index: 200; font-size: 12px; color: var(--dim); }
.bottom-bar .right { margin-right: auto; display: flex; gap: 8px; }
</style>
</head>
<body>

<header>
  <span style="font-size:20px">⚓</span>
  <h1>SkipperQuiz — ניהול שאלות</h1>
  <div class="hright">
    <button class="btn btn-ghost btn-sm" onclick="location.href='hub.html'">← Hub</button>
    <button class="btn btn-ghost btn-sm" onclick="loadData()">↻ רענן</button>
  </div>
</header>

<!-- Config row -->
<div class="cfg-row" id="cfgRow">
  <span>GitHub Token:</span>
  <input id="ghToken" type="password" placeholder="ghp_xxxxxxxx" style="width:200px" oninput="saveCfg()">
  <span>|</span>
  <span>Railway URL:</span>
  <input id="railwayUrl" type="text" placeholder="https://xxx.up.railway.app" style="width:260px" oninput="saveCfg()">
  <span id="cfgStatus"></span>
</div>

<!-- Filters -->
<div class="filters">
  <input type="text" id="search" placeholder="🔍 חפש שאלה..." oninput="renderList()">
  <button class="filter-btn active" id="f-all" onclick="setFilter('all')">הכל</button>
  <button class="filter-btn" id="f-novideo" onclick="setFilter('novideo')">ללא סרטון</button>
  <button class="filter-btn" id="f-ready" onclick="setFilter('ready')">מוכן לפרסום</button>
  <button class="filter-btn" id="f-published" onclick="setFilter('published')">פורסם</button>
</div>

<!-- Stats -->
<div class="stats">
  <span>סה"כ: <span class="stat-val" id="st-total">—</span></span>
  <span>🎬 יש סרטון: <span class="stat-val" id="st-video">—</span></span>
  <span>✅ פורסם: <span class="stat-val" id="st-pub">—</span></span>
  <span>⏳ ממתין לסרטון: <span class="stat-val" id="st-novid">—</span></span>
</div>

<div id="q-list"><div style="text-align:center;padding:60px;color:var(--dim)">טוען...</div></div>

<div class="toast" id="toast"></div>

<div class="bottom-bar">
  <span id="bottomStatus">—</span>
  <div class="right">
    <button class="btn btn-ghost btn-sm" onclick="renderNextBatch()">🎬 רנדר 5 הבאים ללא סרטון</button>
  </div>
</div>

<script>
const REPO = 'argovalex/skipper-quiz';
const MAKE_WEBHOOK = 'https://hook.eu2.make.com/'; // base — user fills full URL or we use stored

let questions = [];
let publishedNums = new Set();
let questionsSHA = null;
let activeFilter = 'all';
let renderingNums = new Set();

// ── Config (localStorage) ─────────────────────────────────────────────────────
function saveCfg() {
  localStorage.setItem('sq_gh_token', document.getElementById('ghToken').value.trim());
  localStorage.setItem('sq_railway_url', document.getElementById('railwayUrl').value.trim());
  updateCfgStatus();
}

function loadCfg() {
  const t = localStorage.getItem('sq_gh_token') || '';
  const r = localStorage.getItem('sq_railway_url') || '';
  document.getElementById('ghToken').value = t;
  document.getElementById('railwayUrl').value = r;
  updateCfgStatus();
}

function updateCfgStatus() {
  const t = document.getElementById('ghToken').value.trim();
  const r = document.getElementById('railwayUrl').value.trim();
  const el = document.getElementById('cfgStatus');
  if (t && r) el.innerHTML = '<span class="ok">✅ מוגדר</span>';
  else if (t) el.innerHTML = '<span class="err">⚠ Railway URL חסר</span>';
  else el.innerHTML = '<span class="err">⚠ Token חסר</span>';
}

function getToken() { return localStorage.getItem('sq_gh_token') || ''; }
function getRailwayUrl() { return (localStorage.getItem('sq_railway_url') || '').replace(/\/$/, ''); }

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
  setBottom('טוען...');
  try {
    // Load questions
    const token = getToken();
    let res;
    if (token) {
      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/questions.json`,
        { headers: { Authorization: `Bearer ${token}` } });
      if (r.ok) {
        const d = await r.json();
        questionsSHA = d.sha;
        questions = JSON.parse(atob(d.content.replace(/\n/g, '')));
      }
    }
    if (!questions.length) {
      res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/questions.json?t=${Date.now()}`);
      questions = await res.json();
    }

    // Load publish log
    try {
      const lr = await fetch(`https://raw.githubusercontent.com/argovalex/skipper-quiz-publisher/main/publish-log.json?t=${Date.now()}`);
      const log = lr.ok ? await lr.json() : [];
      publishedNums = new Set(log.map(e => e.num));
    } catch { publishedNums = new Set(); }

    updateStats();
    renderList();
    setBottom(`✅ ${questions.length} שאלות נטענו`);
  } catch(e) { setBottom('❌ ' + e.message, true); }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const withVideo = questions.filter(q => q.videoUrl).length;
  const published = publishedNums.size;
  document.getElementById('st-total').textContent = questions.length;
  document.getElementById('st-video').textContent = withVideo;
  document.getElementById('st-pub').textContent = published;
  document.getElementById('st-novid').textContent = questions.length - withVideo;
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f).classList.add('active');
  renderList();
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  return questions.filter(q => {
    if (activeFilter === 'novideo' && q.videoUrl) return false;
    if (activeFilter === 'ready' && (!q.videoUrl || publishedNums.has(q.num))) return false;
    if (activeFilter === 'published' && !publishedNums.has(q.num)) return false;
    if (search) {
      const haystack = `${q.num} ${q.topic} ${q.q_he}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById('q-list');

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:60px;color:var(--dim)">אין תוצאות</div>';
    return;
  }

  list.innerHTML = filtered.map(q => {
    const hasVid = !!q.videoUrl;
    const isPub  = publishedNums.has(q.num);
    const isRendering = renderingNums.has(q.num);

    const vidBadge = isPub
      ? '<span class="vid-badge published">✅ פורסם</span>'
      : hasVid
        ? '<span class="vid-badge has">🎬 יש סרטון</span>'
        : '<span class="vid-badge none">⬜ אין סרטון</span>';

    const renderBtn = !hasVid
      ? `<button class="btn btn-render btn-sm" onclick="renderVideo(${q.num})" ${isRendering ? 'disabled' : ''}>${isRendering ? '⏳...' : '🎬 רנדר'}</button>`
      : `<button class="btn btn-render btn-sm" onclick="renderVideo(${q.num})" title="רנדר מחדש" style="opacity:0.5">${isRendering ? '⏳...' : '↺'}</button>`;

    const publishBtn = hasVid
      ? `<button class="btn btn-publish btn-sm" onclick="publishQuestion(${q.num})">📡 פרסם</button>`
      : `<button class="btn btn-publish btn-sm" disabled title="צריך סרטון תחילה">📡 פרסם</button>`;

    return `
    <div class="q-card${isRendering ? ' rendering' : ''}" id="qc-${q.num}">
      <div class="q-meta">
        <span class="q-num-badge">#${q.num}</span>
        <span class="q-topic-tag">${q.topic}</span>
      </div>
      <div>
        <div class="q-text">${q.q_he}</div>
        <div class="q-sub" id="rp-${q.num}">${hasVid ? `<a href="${q.videoUrl}" target="_blank" style="color:var(--dim);font-size:11px">🔗 ${q.videoUrl.slice(-30)}</a>` : ''}</div>
      </div>
      <div class="q-actions">
        ${vidBadge}
        <div class="q-btns">
          ${renderBtn}
          ${publishBtn}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Render video via Railway API ──────────────────────────────────────────────
async function renderVideo(num) {
  const railwayUrl = getRailwayUrl();
  if (!railwayUrl) { toast('⚠ הכנס Railway URL בהגדרות למעלה'); return; }

  renderingNums.add(num);
  renderList();
  setBottom(`🎬 מרנדר Q#${num}...`);
  setRenderProgress(num, '⏳ שולח לRailway...');

  try {
    const res = await fetch(`${railwayUrl}/render/${num}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    // Update local questions array
    const q = questions.find(q => q.num === num);
    if (q && data.videoUrl) {
      q.videoUrl = data.videoUrl;
      q.rendered_at = new Date().toISOString();
    }

    renderingNums.delete(num);
    updateStats();
    renderList();
    toast(`✅ Q#${num} רונדר בהצלחה!`);
    setBottom(`✅ Q#${num} מוכן לפרסום`);
  } catch(e) {
    renderingNums.delete(num);
    renderList();
    toast(`❌ רינדור נכשל: ${e.message}`);
    setBottom(`❌ ${e.message}`, true);
  }
}

// ── Publish directly to Make.com ──────────────────────────────────────────────
async function publishQuestion(num) {
  const q = questions.find(x => x.num === num);
  if (!q || !q.videoUrl) { toast('⚠ אין סרטון לשאלה זו — רנדר קודם'); return; }

  const makeUrl = localStorage.getItem('sq_make_url') || '';
  if (!makeUrl) {
    const url = prompt('הכנס Make.com Webhook URL (פעם אחת):');
    if (!url) return;
    localStorage.setItem('sq_make_url', url.trim());
  }

  const webhookUrl = localStorage.getItem('sq_make_url');

  if (!confirm(`לפרסם Q#${num}?\n${q.q_he.slice(0, 70)}...`)) return;

  try {
    const caption = buildCaption(q);
    const title   = `SkipperQuiz — ${q.topic} שאלה #${q.num}`;

    const payload = {
      videoUrl:    q.videoUrl,
      title,
      caption,
      topic:       q.topic,
      questionNum: q.num,
      date:        new Date().toISOString().split('T')[0]
    };

    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok && res.status !== 200) {
      const txt = await res.text();
      if (txt.includes('Queue is full')) throw new Error('Make.com queue מלאה — נקה ב-Make.com');
      throw new Error(`Make.com ${res.status}: ${txt}`);
    }

    toast(`🚀 Q#${num} נשלח ל-Make.com!`);
    setBottom(`✅ Q#${num} פורסם — Make.com שולח לכל הפלטפורמות`);

    // Update publish log in GitHub
    await updatePublishLog(num, q.videoUrl, q.topic);

    publishedNums.add(num);
    updateStats();
    renderList();
  } catch(e) {
    toast('❌ ' + e.message);
    setBottom('❌ ' + e.message, true);
  }
}

// ── Build caption ─────────────────────────────────────────────────────────────
function buildCaption(q) {
  const LETTER_MAP = {'א':0,'ב':1,'ג':2,'ד':3};
  const idx = LETTER_MAP[(q.answer||'').trim()] ?? 0;
  const opts = (q.options||[]).map(o => o.replace(/^[אבגד]\.\s*/,'').trim());
  const optLines = ['א','ב','ג','ד'].map((l,i) => `${l}. ${opts[i]||''}`).join('\n');
  const answer = opts[idx] || '';
  return `${q.topic} 🚢\n\n${q.q_he}\n\n${optLines}\n\n✅ תשובה: ${answer}\n\n💡 ${q.explanation||''}\n\n#SkipperQuiz #שאלות_נוטים #רישיון_שייט`;
}

// ── Update publish log on GitHub ──────────────────────────────────────────────
async function updatePublishLog(num, videoUrl, topic) {
  const token = getToken();
  if (!token) return;
  try {
    const apiUrl = 'https://api.github.com/repos/argovalex/skipper-quiz-publisher/contents/publish-log.json';
    const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

    let log = [], sha;
    const r = await fetch(apiUrl, { headers });
    if (r.ok) {
      const d = await r.json();
      sha = d.sha;
      log = JSON.parse(atob(d.content.replace(/\n/g,'')));
    }

    log.push({ num, topic, published_at: new Date().toISOString(), videoUrl, platforms: ['youtube','facebook','instagram'] });

    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(log, null, 2))));
    await fetch(apiUrl, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: `publish-log: Q#${num} published`, content: encoded, ...(sha ? {sha} : {}) })
    });
  } catch(e) { console.warn('publish-log update failed:', e.message); }
}

// ── Batch render ──────────────────────────────────────────────────────────────
async function renderNextBatch() {
  const missing = questions.filter(q => !q.videoUrl && !renderingNums.has(q.num)).slice(0, 5);
  if (!missing.length) { toast('✅ כל השאלות כבר יש להן סרטון'); return; }
  toast(`🎬 מתחיל לרנדר ${missing.length} שאלות...`);
  for (const q of missing) {
    await renderVideo(q.num);
    await new Promise(r => setTimeout(r, 500));
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setRenderProgress(num, msg) {
  const el = document.getElementById(`rp-${num}`);
  if (el) el.textContent = msg;
}

function setBottom(msg, warn=false) {
  const el = document.getElementById('bottomStatus');
  el.textContent = msg;
  el.style.color = warn ? 'var(--orange)' : 'var(--dim)';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('on'), 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => { loadCfg(); loadData(); };
</script>
</body>
</html>
