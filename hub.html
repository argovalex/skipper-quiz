<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚢 SkipperQuiz Control Hub</title>
  <style>
    :root {
      --bg:        #0a1628;
      --bg2:       #0f1f3d;
      --bg3:       #152848;
      --accent:    #7eb8f7;
      --accent2:   #4a9de8;
      --green:     #3ddc84;
      --orange:    #f5a623;
      --red:       #e85d5d;
      --purple:    #b084f7;
      --teal:      #5de8d0;
      --yellow:    #f7d35d;
      --text:      #e8f0fe;
      --text-dim:  #7a9cc8;
      --border:    #1e3a6e;
      --card-bg:   #0f1f3d;
      --radius:    12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── HEADER ────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #0a1628 0%, #152848 100%);
      border-bottom: 2px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    .header-title {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .header-title span { color: var(--text); font-weight: 400; }

    /* Status dots row */
    .status-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-link {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .status-link:hover {
      background: var(--bg3);
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(126, 184, 247, 0.15);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }

    /* ── STATS STRIP ───────────────────────────────────── */
    .stats-strip {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 110px;
      transition: box-shadow 0.2s;
    }

    .stat-card:hover {
      box-shadow: 0 0 12px rgba(126, 184, 247, 0.12);
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-value.loading {
      font-size: 1.2rem;
      color: var(--text-dim);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      text-align: center;
    }

    .stat-card.highlight .stat-value { color: var(--green); }
    .stat-card.warn .stat-value { color: var(--orange); }
    .stat-card.info .stat-value { color: var(--purple); }

    /* ── MAIN CONTENT ──────────────────────────────────── */
    .main {
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; padding: 16px; }
      .stats-strip { padding: 12px 16px; }
      .header { padding: 14px 16px; }
      .header-title { font-size: 1.3rem; }
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 0 16px rgba(126, 184, 247, 0.1);
    }

    .card-header {
      background: linear-gradient(135deg, #152848 0%, #1a2f5a 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .card-body { padding: 18px; }

    /* ── TODAY'S QUESTION ──────────────────────────────── */
    .q-loading {
      color: var(--text-dim);
      text-align: center;
      padding: 30px 0;
      font-size: 0.9rem;
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .q-num {
      background: var(--accent2);
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .topic-pill {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      color: #0a1628;
    }

    .q-source-badge {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-right: auto;
      margin-left: 0;
    }

    .q-text {
      font-size: 0.97rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .q-answer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .q-answer-label {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .q-answer-val {
      background: rgba(61, 220, 132, 0.12);
      border: 1px solid rgba(61, 220, 132, 0.3);
      color: var(--green);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 4px 14px;
      border-radius: 6px;
    }

    .q-answer-text {
      font-size: 0.83rem;
      color: var(--text-dim);
    }

    /* topic colors */
    .topic-ניווט        { background: #5de8d0; }
    .topic-מצפן         { background: #7eb8f7; }
    .topic-אורות-ניווט  { background: #f7d35d; }
    .topic-ספנות        { background: #b084f7; }
    .topic-מד-עומק      { background: #f5a623; }
    .topic-קשר-VHF      { background: #3ddc84; }
    .topic-מיצוף        { background: #e85d5d; color: white !important; }
    .topic-ציוד-הצלה    { background: #f7a15d; }
    .topic-אותות-קוליים { background: #5d9ef7; }
    .topic-מכ-מ         { background: #d45df7; }
    .topic-default      { background: #7eb8f7; }

    /* ── BUTTONS ───────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s;
      color: var(--text);
      background: var(--bg3);
      margin-bottom: 10px;
      font-family: inherit;
    }

    .btn:last-child { margin-bottom: 0; }

    .btn:hover {
      background: #1e3a6e;
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(126, 184, 247, 0.18);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn.primary {
      background: var(--accent2);
      border-color: var(--accent);
      color: white;
    }

    .btn.primary:hover {
      background: #5aaaf5;
      box-shadow: 0 0 18px rgba(126, 184, 247, 0.35);
    }

    .btn.green-btn {
      background: rgba(61, 220, 132, 0.1);
      border-color: rgba(61, 220, 132, 0.35);
      color: var(--green);
    }

    .btn.green-btn:hover {
      background: rgba(61, 220, 132, 0.2);
      border-color: var(--green);
    }

    /* Refresh row */
    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      gap: 10px;
      flex-wrap: wrap;
    }

    .refresh-time {
      font-size: 0.76rem;
      color: var(--text-dim);
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      font-size: 0.78rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .btn-refresh:hover {
      background: var(--bg3);
      border-color: var(--accent);
    }

    .spinning { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error notice */
    .fetch-error {
      font-size: 0.78rem;
      color: var(--red);
      background: rgba(232, 93, 93, 0.08);
      border: 1px solid rgba(232, 93, 93, 0.2);
      border-radius: 6px;
      padding: 6px 12px;
      margin-top: 8px;
    }

    /* Countdown bar */
    .countdown-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
    }

    .countdown-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
<header class="header">
  <div class="header-title">🚢 SkipperQuiz <span>Control Hub</span></div>

  <nav class="status-row">
    <a class="status-link" href="index.html" target="skipper-editor" title="פתח עורך" onclick="return openFresh(this)">
      <span class="dot"></span> עורך
    </a>
    <a class="status-link" href="monitor.html" target="skipper-monitor" title="פתח מוניטור">
      <span class="dot"></span> מוניטור
    </a>
    <a class="status-link" href="fix-requests.html" target="skipper-fix" title="בקשות תיקון">
      <span class="dot"></span> תיקונים
    </a>
    <a class="status-link" href="https://github.com/argovalex/skipper-quiz" target="_blank" title="GitHub">
      <span class="dot"></span> GitHub
    </a>
    <a class="status-link" href="https://railway.app" target="_blank" title="Railway">
      <span class="dot"></span> Railway
    </a>
  </nav>
</header>

<!-- ══════════════════════════ STATS STRIP ═══════════════════════════════ -->
<section class="stats-strip" id="stats-strip">
  <div class="stat-card" id="stat-total">
    <div class="stat-value loading" id="val-total">…</div>
    <div class="stat-label">סה"כ שאלות</div>
  </div>
  <div class="stat-card highlight" id="stat-queue">
    <div class="stat-value loading" id="val-queue">…</div>
    <div class="stat-label">ממתינות לפרסום</div>
  </div>
  <div class="stat-card" id="stat-approved" onclick="window.open('queue.html','skipper-queue')" style="cursor:pointer" title="פתח מחסנית פרסום">
    <div class="stat-value loading" id="val-approved">…</div>
    <div class="stat-label">מאושרות ✅</div>
  </div>
  <div class="stat-card info" id="stat-published">
    <div class="stat-value loading" id="val-published">…</div>
    <div class="stat-label">פורסמו</div>
  </div>
  <div class="stat-card warn" id="stat-days">
    <div class="stat-value loading" id="val-days">…</div>
    <div class="stat-label">ימי תוכן נותרים</div>
  </div>
  <div id="stats-error" style="display:none"></div>
</section>

<!-- ══════════════════════════ MAIN GRID ═════════════════════════════════ -->
<main class="main">

  <!-- LEFT: Today's Question -->
  <div class="card">
    <div class="card-header">📤 שאלת היום</div>
    <div class="card-body" id="today-q-body">
      <div class="q-loading">טוען שאלה…</div>
    </div>
  </div>

  <!-- RIGHT: Quick Actions -->
  <div class="card">
    <div class="card-header">📋 פעולות מהירות</div>
    <div class="card-body">
      <a class="btn primary" href="queue.html" target="skipper-queue">📦 מחסנית פרסום</a>
      <a class="btn" href="index.html" target="skipper-editor" onclick="return openFresh(this)">✏️ פתח עורך</a>
      <a class="btn" href="monitor.html" target="skipper-monitor">📊 פתח מוניטור</a>
      <a class="btn" href="fix-requests.html" target="skipper-fix">🛠 בקשות תיקון</a>
      <a class="btn" href="https://github.com/argovalex/skipper-quiz" target="_blank">🐙 GitHub</a>
      <a class="btn" href="https://railway.app" target="_blank">🚂 Railway Logs</a>

      <div class="refresh-row">
        <span class="refresh-time" id="last-refresh-time">טרם רוענן</span>
        <button class="btn-refresh" id="btn-refresh-manual" onclick="loadAll(true)">
          <span id="refresh-icon">🔄</span> רענן
        </button>
      </div>

      <div class="countdown-bar-wrap">
        <div class="countdown-bar" id="countdown-bar" style="width:100%"></div>
      </div>
    </div>
  </div>

</main>

<script>
// These tool links reuse a named window (target="skipper-editor" etc.) so
// repeated clicks don't pile up tabs — but that means if the window is
// already open, clicking again just focuses it without re-fetching the file,
// so edits to index.html/monitor.html/etc. can look "stuck" on an old version.
// Force a real reload when the window already exists.
function openFresh(a) {
  const w = window.open('', a.target);
  if (w && w.location && w.location.href !== 'about:blank') {
    w.location.href = a.href;
    w.focus();
    return false;
  }
  return true; // no existing window — let the normal link navigation open it
}

// ── Config ──────────────────────────────────────────────────────────────
const QUESTIONS_URL   = 'https://raw.githubusercontent.com/argovalex/skipper-quiz/main/questions.json';
// skipper-quiz-publisher (where publish-log.json lives) is a private repo, and
// this is a public no-login page with nowhere to hold a GitHub token, so a
// direct raw.githubusercontent.com fetch here always 404s. Go through the
// publisher server's own read-only proxy instead — it already has the token.
const PUBLISH_LOG_URL = 'https://skipper-quiz-publisher-production.up.railway.app/publish-log';
const AUTO_REFRESH_SEC = 60;

// Topic → color mapping
const TOPIC_COLORS = {
  'ניווט':         '#5de8d0',
  'מצפן':          '#7eb8f7',
  'אורות ניווט':   '#f7d35d',
  'ספנות':         '#b084f7',
  'מד עומק':       '#f5a623',
  'קשר VHF':       '#3ddc84',
  'מיצוף':         '#e85d5d',
  'ציוד הצלה':     '#f7a15d',
  'אותות קוליים':  '#5d9ef7',
  'מכ"מ':          '#d45df7',
};

// ── State ───────────────────────────────────────────────────────────────
let questions   = null;
let publishLog  = null;  // array of {num} or null if 404
let refreshTimer  = null;
let countdownInt  = null;
let countdownSecs = AUTO_REFRESH_SEC;

// ── Fetch helpers ────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── Today's question logic ───────────────────────────────────────────────
function getTodayQuestion(qs, log) {
  const publishedNums = new Set(
    log ? log.map(e => (typeof e === 'object' ? (e.num || e.question_num) : e)) : []
  );

  // Priority 1: approved_for_publish=true AND not in log
  const queue = qs.filter(q => q.approved_for_publish && !publishedNums.has(q.num));
  if (queue.length > 0) {
    return { q: queue[0], source: 'תור פרסום' };
  }

  // Fallback: dayOfYear % total
  const now  = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff  = now - start;
  const day   = Math.floor(diff / (1000 * 60 * 60 * 24));
  const idx   = day % qs.length;
  return { q: qs[idx], source: 'סבב יומי' };
}

// ── Render stats ─────────────────────────────────────────────────────────
function renderStats(qs, log) {
  const total = qs.length;

  const publishedNums = new Set(
    log ? log.map(e => (typeof e === 'object' ? (e.num || e.question_num) : e)) : []
  );

  // Published count: prefer log length, else count published_at
  const publishedCount = log
    ? log.length
    : qs.filter(q => q.published_at).length;

  // Queue = approved_for_publish=true AND not in log
  const queueCount = qs.filter(q => q.approved_for_publish && !publishedNums.has(q.num)).length;

  // Days of content = unpublished (not yet sent) questions
  const remaining = total - publishedCount;
  const daysLeft  = Math.max(0, remaining);

  const approvedCount = qs.filter(q => q.approved_for_publish).length;

  setText('val-total',     total);
  setText('val-queue',     queueCount);
  setText('val-approved',  approvedCount);
  setText('val-published', publishedCount);
  setText('val-days',      daysLeft > 9999 ? '∞' : daysLeft);

  // Highlight approved card — orange if 0, green otherwise
  const approvedCard = document.getElementById('stat-approved');
  if (approvedCard) approvedCard.className = 'stat-card ' + (approvedCount === 0 ? 'warn' : 'highlight');
  approvedCard.style.cursor = 'pointer';

  // Color warn if low
  const daysCard = document.getElementById('stat-days');
  daysCard.className = 'stat-card ' + (daysLeft < 14 ? 'warn' : daysLeft < 30 ? 'highlight' : 'info');
}

// ── Render today's question ──────────────────────────────────────────────
function renderTodayQuestion(qs, log) {
  const { q, source } = getTodayQuestion(qs, log);
  const body = document.getElementById('today-q-body');

  // Build correct answer text
  const correctLetter = q.answer; // 'א', 'ב', etc.
  const options = q.options || [];
  const correctOption = options.find(o => o.startsWith(correctLetter + '.') || o.startsWith(correctLetter + '. ') || o.startsWith(correctLetter));
  const answerText = correctOption
    ? correctOption.replace(/^[אבגד]\.\s?/, '').replace(/^[אבגד]\s/, '')
    : '';

  // Topic pill color
  const topicColor = TOPIC_COLORS[q.topic] || '#7eb8f7';
  const topicDark  = ['מיצוף'].includes(q.topic);

  body.innerHTML = `
    <div class="q-meta">
      <span class="q-num">#${q.num}</span>
      <span class="topic-pill" style="background:${topicColor};color:${topicDark ? '#fff' : '#0a1628'}">${q.topic}</span>
      <span class="q-source-badge">${source}</span>
    </div>
    <div class="q-text">${q.q_he}</div>
    <div class="q-answer-row">
      <span class="q-answer-label">תשובה נכונה:</span>
      <span class="q-answer-val">${correctLetter}</span>
      <span class="q-answer-text">${answerText}</span>
    </div>
    <a class="btn green-btn" href="monitor.html" target="skipper-monitor">▶️ צפה בתור המלא</a>
  `;
}

// ── Main loader ──────────────────────────────────────────────────────────
async function loadAll(manual = false) {
  // Spin the refresh icon
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');

  // Hide previous error
  const errEl = document.getElementById('stats-error');
  errEl.style.display = 'none';

  try {
    // Load questions (required)
    questions = await fetchJSON(QUESTIONS_URL);

    // Load publish log (optional – 404 is fine)
    try {
      publishLog = await fetchJSON(PUBLISH_LOG_URL);
    } catch (e) {
      publishLog = null; // 404 or network error – graceful fallback
    }

    renderStats(questions, publishLog);
    renderTodayQuestion(questions, publishLog);

    // Update refresh time
    const now = new Date();
    document.getElementById('last-refresh-time').textContent =
      'עודכן: ' + now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  } catch (e) {
    errEl.innerHTML = '<div class="fetch-error">⚠️ שגיאה בטעינת הנתונים: ' + e.message + '</div>';
    errEl.style.display = 'block';
    // Show placeholders as dashes
    ['val-total','val-queue','val-published','val-days'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '—';
      el.classList.remove('loading');
    });
    document.getElementById('today-q-body').innerHTML =
      '<div class="q-loading" style="color:var(--red)">⚠️ לא ניתן לטעון שאלות</div>';
  }

  icon.classList.remove('spinning');

  // Reset countdown
  countdownSecs = AUTO_REFRESH_SEC;
  updateCountdownBar();
}

// ── Auto-refresh countdown bar ───────────────────────────────────────────
function updateCountdownBar() {
  const bar = document.getElementById('countdown-bar');
  const pct = (countdownSecs / AUTO_REFRESH_SEC) * 100;
  bar.style.width = pct + '%';
}

function startCountdown() {
  if (countdownInt) clearInterval(countdownInt);
  countdownInt = setInterval(() => {
    countdownSecs--;
    updateCountdownBar();
    if (countdownSecs <= 0) {
      loadAll();
    }
  }, 1000);
}

// ── Utility ─────────────────────────────────────────────────────────────
function setText(id, val) {
  const el = document.getElementById(id);
  if (el) {
    el.textContent = val;
    el.classList.remove('loading');
  }
}

// ── Init ─────────────────────────────────────────────────────────────────
