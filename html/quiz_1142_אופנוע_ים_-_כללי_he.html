<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8">
<title>Skipper Quiz #1142 — אופנוע ים - כללי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
#reel{width:390px;height:625px;background:#0c1a3a;overflow:hidden;position:relative;display:flex;flex-direction:column;font-family:'Heebo',sans-serif;direction:rtl}
#hdr{background:#0c1a3a;padding:14px 16px 10px;flex-shrink:0;border-bottom:2px solid #1e3a6e;text-align:center}
.brand{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.htitle{color:#fff;font-size:18px;font-weight:900}
#scene{flex:1;position:relative;overflow:hidden}
#ftr{background:#0c1a3a;padding:12px 16px;flex-shrink:0;border-top:2px solid #1e3a6e}
.ql{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.qt{color:#fff;font-size:13px;font-weight:700;line-height:1.4;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{background:#1a2f5e;border:1px solid #2a4a8a;border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all 0.5s}
.ltr{background:#0c1a3a;color:#7eb8f7;font-size:11px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.opt.correct{background:#0d3d2a;border-color:#2ecc71;color:#2ecc71}
.opt.correct .ltr{background:#2ecc71;color:#0d3d2a}
.opt.wrong{background:#3d1a1a;border-color:#e74c3c;color:#e74c3c}
.opt.wrong .ltr{background:#e74c3c;color:#fff}
.opt.dim{opacity:0.3}
#prog{position:absolute;bottom:0;left:0;height:2px;background:#4a90d9;width:0;z-index:5}

  <g>

        fill="none" stroke="#1f2f3f" stroke-width="5.5249999999999995" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/>
  <!-- torso -->

        stroke-width="11.049999999999999" stroke-linecap="round"/>
  <!-- lifejacket over the torso, kept narrower than the torso so the kit colour
       still reads at the edges — the kit is what tells the two riders apart -->
  <path d="M145.15,264.35 L149.6125,252.45" fill="none" stroke="#f4d03f"
        stroke-width="6.8" stroke-linecap="round" opacity=".92"/>
  <!-- front leg -->
  <path d="M146,270.3 L159.6,270.3 L160.45,282.2"
        fill="none" stroke="#2c3e50" stroke-width="5.95" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arm reaching for the bars, or flung up -->

        stroke-width="4.675" stroke-linecap="round"/>
  <!-- head, helmet and visor -->
  <circle cx="153.65" cy="243.1" r="6.375" fill="#f5cba7"/>
  <path d="M146.85,242.25 A6.8,6.8 0 0 1 160.45,242.25 L160.45,240.55 L146.85,240.55 Z"
        fill="#2980b9" opacity=".95"/>
  <circle cx="153.65" cy="242.25" r="6.8"
          fill="none" stroke="#2980b9" stroke-width="2.55" stroke-dasharray="21.25 85"/>
  </g>

  <!-- kill-switch button on the console, forward of the rider -->

  <!-- coiled lanyard spanning the gap from the button to the rider's wrist -->
  <path d="M219.0 252.0 L218.2 253.3 L216.7 254.4 L214.6 255.1 L212.3 255.5 L209.9 255.4 L207.9 254.9 L206.4 254.0 L205.6 253.0 L205.5 252.0 L206.2 251.1 L207.4 250.6 L208.9 250.5 L210.3 250.9 L211.5 251.6 L212.2 252.7 L212.1 254.0 L211.3 255.3 L209.8 256.4 L207.8 257.1 L205.4 257.5 L203.1 257.4 L201.0 256.9 L199.5 256.0 L198.7 255.0 L198.7 254.0 L199.3 253.1 L200.5 252.6 L202.0 252.5 L203.5 252.9 L204.7 253.6 L205.3 254.7 L205.3 256.0 L204.5 257.3 L203.0 258.4 L200.9 259.1 L198.6 259.5 L196.2 259.4 L194.2 258.9 L192.7 258.0 L191.9 257.0 L191.8 256.0 L192.5 255.1 L193.7 254.6 L195.1 254.5 L196.6 254.9 L197.8 255.6 L198.5 256.7 L198.4 258.0 L197.6 259.3 L196.1 260.4 L194.1 261.1 L191.7 261.5 L189.4 261.4 L187.3 260.9 L185.8 260.0 L185.0 259.0 L185.0 258.0 L185.6 257.1 L186.8 256.6 L188.3 256.5 L189.8 256.9 L191.0 257.6 L191.6 258.7 L191.6 260.0 L190.8 261.3 L189.2 262.4 L187.2 263.1 L184.9 263.5 L182.5 263.4 L180.5 262.9 L179.0 262.0 L178.1 261.0 L178.1 260.0 L178.8 259.1 L179.9 258.6 L181.4 258.5 L182.9 258.9 L184.1 259.6 L184.8 260.7 L184.7 262.0 L183.9 263.3 L182.4 264.4 L180.3 265.1 L178.0 265.5 L175.7 265.4 L173.6 264.9 L172.1 264.0 L171.3 263.0 L171.2 262.0 L171.9 261.1 L173.1 260.6 L174.6 260.5 L176.1 260.9 L177.2 261.6 L177.9 262.7 L177.9 264.0 L177.0 265.3 L175.5 266.4 L173.5 267.1 L171.1 267.5 L168.8 267.4 L166.8 266.9 L165.2 266.0 L164.4 265.0 L164.4 264.0 L165.0 263.1 L166.2 262.6 L167.7 262.5 L169.2 262.9 L170.4 263.6 L171.0 264.7 L171.0 266.0" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <!-- red band on the rider's wrist -->
  <circle cx="164" cy="267" r="5" fill="none" stroke="#e74c3c" stroke-width="2.6"/>

  <text x="118" y="218" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="Heebo,sans-serif" font-weight="700">מחובר ליד הנוהג</text>

  <path d="M238.5,300 L242.9,304.4 L250.6,294.5"
    fill="none" stroke="#2ecc71" stroke-width="3.3000000000000003" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="322" text-anchor="middle" fill="#2ecc71" font-size="12.5" font-family="Heebo,sans-serif" font-weight="900">הפתיל מחובר לפרק כף היד של הנוהג</text>

      <g id="ov" opacity="0">
        <rect x="60" y="8" width="240" height="38" rx="19" fill="#0d3d2a" stroke="#2ecc71" stroke-width="2" opacity="0.95"/>

      </g>
      <text x="180" y="345" text-anchor="middle" fill="#7eb8f7" font-size="12" font-family="Heebo,sans-serif" font-weight="700" opacity="1">⚓ Alex Argov | Sailing Instructor</text>

    <div id="prog"></div>
  </div>
  <div id="ftr">
    <div class="ql" id="ql">❓ השאלה</div>
    <div class="qt" id="qt">מהי התקנה בדבר מדומם חירום באופנוע ים?</div>
    <div class="opts" id="opts"><div class="opt" id="o0"><div class="ltr">א</div>יש לחבר את המדומם לאופנוע ליד ההגה.</div><div class="opt" id="o1"><div class="ltr">ב</div>יש לחבר את המדומם לנוסע מאחורי הנהג.</div><div class="opt" id="o2"><div class="ltr">ג</div>יש לחבר את המדומם לנוהג.</div><div class="opt" id="o3"><div class="ltr">ד</div>אין חשיבות למי מחברים את המדומם.</div></div>
  </div>
</div>
<script>
const C=2;
const OPTS=["א. יש לחבר את המדומם לאופנוע ליד ההגה.","ב. יש לחבר את המדומם לנוסע מאחורי הנהג.","ג. יש לחבר את המדומם לנוהג.","ד. אין חשיבות למי מחברים את המדומם."];
const Q="מהי התקנה בדבר מדומם חירום באופנוע ים?";
const E="מדומם חירום (Kill Switch) חייב להיות מחובר לגוף הנוהג למניעת בריחת אופנוע ללא נוהג.";
const LT=["א","ב","ג","ד"];

// AUTO-PLAY MODE — countdown then reveal (for screen recording)
// Gated behind window.__startAutoPlay() instead of running on page load, so the
// recorder (Puppeteer) can fire it the instant the screencast actually starts —
// otherwise the timer head-starts before recording begins and drifts out of sync
// with the audio track (which assumes recording-start == t=0).
window.__startAutoPlay = function(){
const prog=document.getElementById('prog');
const DELAY=15000;
prog.style.transition='none';prog.style.width='0%';
setTimeout(()=>{prog.style.transition='width '+DELAY+'ms linear';prog.style.width='100%';},30);
setTimeout(()=>{
  document.querySelectorAll('.opt').forEach((o,j)=>{
    o.style.transition='all 0.6s';
    if(j===C)o.classList.add('correct'); else o.classList.add('dim');
  });
  const ov=document.getElementById('ov');
  const txt=document.getElementById('ovText');
  const rect=ov.querySelector('rect');
  txt.textContent='✅ תשובה נכונה!';txt.setAttribute('fill','#2ecc71');
  rect.setAttribute('fill','#0d3d2a');rect.setAttribute('stroke','#2ecc71');
  ov.setAttribute('opacity','1');
  setTimeout(()=>{
    document.getElementById('ql').textContent='✅ התשובה הנכונה:';
    document.getElementById('qt').innerHTML='<span style="color:#2ecc71;font-size:11px;font-weight:900">'+OPTS[C]+'</span>'+(E?'<br><span style="color:#aac4e8;font-size:10px;font-weight:400">'+E+'</span>':'');
    // Second countdown — next card (loop for batch recording)
    const prog2=document.getElementById('prog');
    prog2.style.transition='none';prog2.style.width='0%';
    setTimeout(()=>{prog2.style.transition='width 4000ms linear';prog2.style.width='100%';},30);
  },600);
},DELAY+50);
};


</script></body></html>
