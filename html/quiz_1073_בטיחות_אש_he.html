<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8">
<title>Skipper Quiz #1073 — בטיחות אש</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.min.js"></script>
<link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
#reel{width:390px;height:625px;background:#0c1a3a;overflow:hidden;position:relative;display:flex;flex-direction:column;font-family:'Heebo',sans-serif;direction:rtl}
#hdr{background:#0c1a3a;padding:14px 16px 10px;flex-shrink:0;border-bottom:2px solid #1e3a6e;text-align:center}
.brand{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.htitle{color:#fff;font-size:18px;font-weight:900}
#scene{flex:1;position:relative;overflow:hidden}
#ftr{background:#0c1a3a;padding:12px 16px;flex-shrink:0;border-top:2px solid #1e3a6e}
.ql{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.qt{color:#fff;font-size:13px;font-weight:700;line-height:1.4;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{background:#1a2f5e;border:1px solid #2a4a8a;border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all 0.5s}
.ltr{background:#0c1a3a;color:#7eb8f7;font-size:11px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.opt.correct{background:#0d3d2a;border-color:#2ecc71;color:#2ecc71}
.opt.correct .ltr{background:#2ecc71;color:#0d3d2a}
.opt.wrong{background:#3d1a1a;border-color:#e74c3c;color:#e74c3c}
.opt.wrong .ltr{background:#e74c3c;color:#fff}
.opt.dim{opacity:0.3}
#prog{position:absolute;bottom:0;left:0;height:2px;background:#4a90d9;width:0;z-index:5}
</style></head><body>
<div id="reel">
  <div id="hdr"><div class="brand">⚓ SKIPPER QUIZ</div><div class="htitle">מבחן הסקיפר היומי של אלכס ארגוב</div></div>
  <div id="scene">
    <div id="map" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.85"></div>
    <svg width="100%" height="100%" viewBox="0 0 360 420" preserveAspectRatio="xMidYMid slice" style="position:absolute;top:0;left:0;pointer-events:none">
      <text x="180" y="25" text-anchor="middle" fill="#cc0000" font-size="12" font-family="Heebo,sans-serif" font-weight="900" stroke="#fff" stroke-width="0.3">⚠ שטח אש 30 - עתלית</text>
      <g id="answer-overlay" opacity="0">
        <rect x="20" y="340" width="320" height="50" rx="8" fill="rgba(0,0,0,0.75)"/>
        <text x="180" y="362" text-anchor="middle" fill="#ff6666" font-size="11" font-family="Heebo,sans-serif" font-weight="700">2 מיל מערבה - הפלגה אסורה!</text>
        <text x="180" y="380" text-anchor="middle" fill="#ffcccc" font-size="9" font-family="Heebo,sans-serif">שטח אש 30 אוסר הפלגה באזור</text>
      </g>
      <g id="ov" opacity="0">
        <rect x="60" y="8" width="240" height="38" rx="19" fill="#0d3d2a" stroke="#2ecc71" stroke-width="2" opacity="0.95"/>
        <text id="ovText" x="180" y="32" text-anchor="middle" fill="#2ecc71" font-size="20" font-family="Heebo,sans-serif" font-weight="900">✅ נכון!</text>
      </g>
      <text x="180" y="410" text-anchor="middle" fill="#fff" font-size="10" font-family="Heebo,sans-serif" font-weight="700" opacity="0.8">⚓ Alex Argov | Sailing Instructor</text>
    </svg>
    <script>
    maptilersdk.config.apiKey = '2eDxQEb5BnHq6DXnTpCl';
    const map = new maptilersdk.Map({
      container: 'map',
      style: maptilersdk.MapStyle.OCEAN,
      center: [34.91, 32.70],
      zoom: 12.3,
      interactive: false,
      attributionControl: false
    });
    map.on('load', () => {
      map.addSource('fire-zone', {
        type: 'geojson',
        data: { type:'Feature', geometry:{ type:'Polygon', coordinates:[[
          [34.94,32.73],[34.88,32.73],[34.88,32.67],[34.94,32.67],[34.94,32.73]
        ]]}, properties:{} }
      });
      map.addLayer({ id:'fire-fill', type:'fill', source:'fire-zone', paint:{'fill-color':'#ff0000','fill-opacity':0.35} });
      map.addLayer({ id:'fire-border', type:'line', source:'fire-zone', paint:{'line-color':'#ff0000','line-width':2.5,'line-dasharray':[4,2]} });
      map.addSource('two-mile-line', {
        type: 'geojson',
        data: { type:'Feature', geometry:{ type:'LineString', coordinates:[
          [34.88,32.74],[34.88,32.66]
        ]}, properties:{} }
      });
      map.addLayer({ id:'mile-line', type:'line', source:'two-mile-line', paint:{'line-color':'#ffcc00','line-width':3,'line-dasharray':[6,3]} });
      map.addSource('two-mile-label', {
        type: 'geojson',
        data: { type:'Feature', geometry:{ type:'Point', coordinates:[34.88,32.735] }, properties:{ label:'קו 2 מיל ←' } }
      });
      map.addLayer({ id:'mile-label', type:'symbol', source:'two-mile-label', layout:{'text-field':['get','label'],'text-size':11,'text-anchor':'top','text-offset':[0,0.5]}, paint:{'text-color':'#ffcc00','text-halo-color':'#000','text-halo-width':1.5} });
      map.addSource('atlit-label', {
        type: 'geojson',
        data: { type:'Feature', geometry:{ type:'Point', coordinates:[34.945,32.70] }, properties:{ label:'עתלית' } }
      });
      map.addLayer({ id:'atlit-text', type:'symbol', source:'atlit-label', layout:{'text-field':['get','label'],'text-size':14,'text-anchor':'left','text-offset':[0.3,0]}, paint:{'text-color':'#ffffff','text-halo-color':'#333','text-halo-width':2} });
      map.addSource('fire-label', {
        type: 'geojson',
        data: { type:'Feature', geometry:{ type:'Point', coordinates:[34.91,32.70] }, properties:{ label:'שטח אש 30' } }
      });
      map.addLayer({ id:'fire-text', type:'symbol', source:'fire-label', layout:{'text-field':['get','label'],'text-size':13,'text-anchor':'center'}, paint:{'text-color':'#ff4444','text-halo-color':'#000','text-halo-width':1.5} });
    });
    </script>
    <div id="prog"></div>
  </div>
  <div id="ftr">
    <div class="ql" id="ql">❓ השאלה</div>
    <div class="qt" id="qt">האם מותר להפליג עם אופנוע – ים במרחק של 2 מיל מערבית לשטח אש 30 (עתלית)?</div>
    <div class="opts" id="opts"><div class="opt" id="o0"><div class="ltr">א</div>רק באישור מיוחד של משרד התחבורה.</div><div class="opt" id="o1"><div class="ltr">ב</div>אסור להפליג בשום תנאי מערבית לעתלית למרחק של 2 מיל.</div><div class="opt" id="o2"><div class="ltr">ג</div>מותר להפליג במרחק של 300 מטר מערבית לעתלית.</div><div class="opt" id="o3"><div class="ltr">ד</div>יש להתרחק לפחות 3 מיל מעתלית.</div></div>
  </div>
</div>
<script>
const C=1;
const OPTS=["א. רק באישור מיוחד של משרד התחבורה.","ב. אסור להפליג בשום תנאי מערבית לעתלית למרחק של 2 מיל.","ג. מותר להפליג במרחק של 300 מטר מערבית לעתלית.","ד. יש להתרחק לפחות 3 מיל מעתלית."];
const Q="האם מותר להפליג עם אופנוע – ים במרחק של 2 מיל מערבית לשטח אש 30 (עתלית)?";
const E="אסור להפליג בשום תנאי מערבית לעתלית למרחק של 2 מיל - שטח אש 30 אוסר הפלגה באזור.";
const LT=["א","ב","ג","ד"];

window.__startAutoPlay = function(){
const prog=document.getElementById('prog');
const DELAY=15000;
prog.style.transition='none';prog.style.width='0%';
setTimeout(()=>{prog.style.transition='width '+DELAY+'ms linear';prog.style.width='100%';},30);
setTimeout(()=>{
  document.querySelectorAll('.opt').forEach((o,j)=>{
    o.style.transition='all 0.6s';
    if(j===C)o.classList.add('correct'); else o.classList.add('dim');
  });
  const ov=document.getElementById('ov');
  const txt=document.getElementById('ovText');
  const rect=ov.querySelector('rect');
  txt.textContent='✅ תשובה נכונה!';txt.setAttribute('fill','#2ecc71');
  rect.setAttribute('fill','#0d3d2a');rect.setAttribute('stroke','#2ecc71');
  ov.setAttribute('opacity','1');
  document.getElementById('answer-overlay').setAttribute('opacity','1');
  setTimeout(()=>{
    document.getElementById('ql').textContent='✅ התשובה הנכונה:';
    document.getElementById('qt').innerHTML='<span style="color:#2ecc71;font-size:11px;font-weight:900">'+OPTS[C]+'</span>'+(E?'<br><span style="color:#aac4e8;font-size:10px;font-weight:400">'+E+'</span>':'');
    const prog2=document.getElementById('prog');
    prog2.style.transition='none';prog2.style.width='0%';
    setTimeout(()=>{prog2.style.transition='width 4000ms linear';prog2.style.width='100%';},30);
  },600);
},DELAY+50);
};
</script></body></html>
