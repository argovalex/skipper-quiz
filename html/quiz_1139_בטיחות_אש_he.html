<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
#reel{width:390px;height:625px;background:#0c1a3a;overflow:hidden;position:relative;display:flex;flex-direction:column;font-family:'Heebo',sans-serif;direction:rtl}
#hdr{background:#0c1a3a;padding:14px 16px 10px;flex-shrink:0;border-bottom:2px solid #1e3a6e;text-align:center}
.brand{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.htitle{color:#fff;font-size:18px;font-weight:900}
#scene{flex:1;position:relative;overflow:hidden}
#ftr{background:#0c1a3a;padding:12px 16px;flex-shrink:0;border-top:2px solid #1e3a6e}
.ql{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.qt{color:#fff;font-size:13px;font-weight:700;line-height:1.4;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{background:#1a2f5e;border:1px solid #2a4a8a;border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all 0.5s}
.ltr{background:#0c1a3a;color:#7eb8f7;font-size:11px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.opt.correct{background:#0d3d2a;border-color:#2ecc71;color:#2ecc71}
.opt.correct .ltr{background:#2ecc71;color:#0d3d2a}
.opt.wrong{background:#3d1a1a;border-color:#e74c3c;color:#e74c3c}
.opt.wrong .ltr{background:#e74c3c;color:#fff}
.opt.dim{opacity:0.3}
#prog{position:absolute;bottom:0;left:0;height:2px;background:#4a90d9;width:0;z-index:5}
</style></head><body>
<div id="reel">
  <div id="hdr"><div class="brand">⚓ SKIPPER QUIZ</div><div class="htitle">מבחן הסקיפר היומי של אלכס ארגוב</div></div>
  <div id="scene">
    
    <svg width="100%" height="100%" viewBox="0 0 360 420" preserveAspectRatio="xMidYMid slice" style="">
      
  <rect width="360" height="420" fill="#0a1428"/>
  <rect x="0" y="238" width="360" height="182" fill="#1a5276"/>
  <path d="M0 238 L96 238 L96 420 L0 420 Z" fill="#d9c08a"/>
  <text x="180" y="132" text-anchor="middle" fill="#fff" font-size="16" font-family="Heebo,sans-serif" font-weight="900">לפני יציאה להפלגה</text>

  <!-- the note left ashore. Kept clear of x<32, which the slice crop removes,
       and its label sits on the dark background rather than on the sand. -->

  <g transform="translate(70,232)">
    <rect x="-28" y="-38" width="56" height="70" rx="4" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.6"/>
    <path d="M-18,-22 L18,-22 M-18,-10 L18,-10 M-18,2 L10,2 M-18,14 L14,14" stroke="#5d6d7e" stroke-width="2"/>
  </g>

  <!-- what the note says -->
  <path d="M294.75,182 L298.95,186.2 L306.3,176.75"
    fill="none" stroke="#2ecc71" stroke-width="3.1500000000000004" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="212" y="186" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="Heebo,sans-serif" font-weight="700">לאן אתה מפליג</text>
  <path d="M294.75,208 L298.95,212.2 L306.3,202.75"
    fill="none" stroke="#2ecc71" stroke-width="3.1500000000000004" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="212" y="212" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="Heebo,sans-serif" font-weight="700">זמן חזרה משוער</text>

  <!-- the craft heading out -->
  
  <g>
  <!-- Stern boarding platform -->
  <path d="M196.96,291.28 L206.32,289.84 L206.32,294.16 L198.4,293.44 Z" fill="#c8a000" opacity=".85"/>
  <!-- Hull: deck line aft, rising to a tall bow, keel sweeping up at both ends -->
  <path d="M204.88,286.24 L262.48,286.24 Q271.84,285.52 274,282.64
           Q274.72,289.84 268.96,294.16 Q256.72,297.76 233.68,297.76
           Q214.96,297.76 207.76,294.16 Z"
        fill="#f1c40f" stroke="#c8a000" stroke-width="1.152" stroke-linejoin="round"/>
  <!-- Waterline shading on the submerged part -->
  <path d="M207.04,292 L271.12,292 Q256.72,297.76 233.68,297.76 Q214.96,297.76 207.76,294.16 Z"
        fill="#c8a000" opacity=".45"/>
  <!-- Rubbing strake along the hull -->
  <path d="M205.6,289.12 L269.68,288.4" stroke="#c8a000" stroke-width="1.08" opacity=".8"/>
  <!-- Saddle: long, from the stern deck forward to the console -->
  <path d="M209.2,286.24 Q209.2,281.2 213.52,279.04 Q222.16,276.88 232.24,277.6
           Q240.16,278.32 245.2,281.92 L246.64,286.24 Z"
        fill="#2c3e50" stroke="#1a2530" stroke-width="0.9359999999999999" stroke-linejoin="round"/>
  <!-- Front hood / storage, ahead of the rider, sloping to the bow -->
  <path d="M245.2,281.92 L246.64,276.88 Q252.4,275.44 259.6,276.88 Q267.52,278.32 271.84,283.36
           L271.12,285.52 Q259.6,284.08 245.92,283.36 Z"
        fill="#f1c40f" stroke="#c8a000" stroke-width="1.008" stroke-linejoin="round"/>
  <path d="M259.6,277.6 Q266.8,279.04 270.4,282.64" fill="none" stroke="#fff" stroke-width="1.152" opacity=".35"/>
  <!-- Handlebars, sitting just aft of the hood -->
  <path d="M245.92,273.28 L245.92,279.76" stroke="#2c3e50" stroke-width="1.728"/>
  <path d="M240.88,273.28 L250.24,272.56" stroke="#2c3e50" stroke-width="2.16" stroke-linecap="round"/>
  <circle cx="240.16" cy="273.28" r="1.8719999999999999" fill="#1a2530"/>
  <circle cx="250.96" cy="272.56" r="1.8719999999999999" fill="#1a2530"/>
  <!-- Jet nozzle -->
  <rect x="202" y="287.68" width="5.04" height="5.04" rx="1.08" fill="#7f8c8d"/>
  </g>
  <path d="M282 268 L322 268" stroke="#7eb8f7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M322 268 L313 263 L313 273 Z" fill="#7eb8f7"/>

  <text x="180" y="330" text-anchor="middle" fill="#fff" font-size="12.5" font-family="Heebo,sans-serif" font-weight="900">כדי שידעו לחפש אותך אם לא חזרת</text>

      <g id="ov" opacity="0">
        <rect x="60" y="8" width="240" height="38" rx="19" fill="#0d3d2a" stroke="#2ecc71" stroke-width="2" opacity="0.95"/>
        <text id="ovText" x="180" y="32" text-anchor="middle" fill="#2ecc71" font-size="20" font-family="Heebo,sans-serif" font-weight="900">✅ נכון!</text>
      </g>
      <text x="180" y="345" text-anchor="middle" fill="#7eb8f7" font-size="12" font-family="Heebo,sans-serif" font-weight="700" opacity="1">⚓ Alex Argov | Sailing Instructor</text>
    </svg>
    <div id="prog"></div>
  </div>
  <div id="ftr">
    <div class="ql" id="ql">❓ השאלה</div>
    <div class="qt" id="qt">כיצד תנהג כאשר החלטת לשוט עם אופנוע הים מחוף הרצליה לחוף בת-ים?</div>
    <div class="opts" id="opts"><div class="opt" id="o0"><div class="ltr">א</div>תשאיר הודעה בחוף לגבי כוונותיך וזמן חזרה משוער.</div><div class="opt" id="o1"><div class="ltr">ב</div>תתארגן ותצא ישר לים.</div><div class="opt" id="o2"><div class="ltr">ג</div>אין צורך בהכנות מיוחדות, לאופנוע אין בעיה לכסות טווח זה.</div><div class="opt" id="o3"><div class="ltr">ד</div>תודיע לחברך בחוף שיצאת לשוט.</div></div>
  </div>
</div>
<script>
const C=0;
const OPTS=["א. תשאיר הודעה בחוף לגבי כוונותיך וזמן חזרה משוער.","ב. תתארגן ותצא ישר לים.","ג. אין צורך בהכנות מיוחדות, לאופנוע אין בעיה לכסות טווח זה.","ד. תודיע לחברך בחוף שיצאת לשוט."];
const Q="כיצד תנהג כאשר החלטת לשוט עם אופנוע הים מחוף הרצליה לחוף בת-ים?";
const E="בהפלגה ארוכה בין חופים יש להשאיר הודעה עם פרטי ההפלגה וזמן חזרה משוער.";
const LT=["א","ב","ג","ד"];

// AUTO-PLAY MODE — countdown then reveal (for screen recording)
// Gated behind window.__startAutoPlay() instead of running on page load, so the
// recorder (Puppeteer) can fire it the instant the screencast actually starts —
// otherwise the timer head-starts before recording begins and drifts out of sync
// with the audio track (which assumes recording-start == t=0).
window.__startAutoPlay = function(){
const prog=document.getElementById('prog');
const DELAY=15000;
prog.style.transition='none';prog.style.width='0%';
setTimeout(()=>{prog.style.transition='width '+DELAY+'ms linear';prog.style.width='100%';},30);
setTimeout(()=>{
  document.querySelectorAll('.opt').forEach((o,j)=>{
    o.style.transition='all 0.6s';
    if(j===C)o.classList.add('correct'); else o.classList.add('dim');
  });
  const ov=document.getElementById('ov');
  const txt=document.getElementById('ovText');
  const rect=ov.querySelector('rect');
  txt.textContent='✅ תשובה נכונה!';txt.setAttribute('fill','#2ecc71');
  rect.setAttribute('fill','#0d3d2a');rect.setAttribute('stroke','#2ecc71');
  ov.setAttribute('opacity','1');
  setTimeout(()=>{
    document.getElementById('ql').textContent='✅ התשובה הנכונה:';
    document.getElementById('qt').innerHTML='<span style="color:#2ecc71;font-size:11px;font-weight:900">'+OPTS[C]+'</span>'+(E?'<br><span style="color:#aac4e8;font-size:10px;font-weight:400">'+E+'</span>':'');
    // Second countdown — next card (loop for batch recording)
    const prog2=document.getElementById('prog');
    prog2.style.transition='none';prog2.style.width='0%';
    setTimeout(()=>{prog2.style.transition='width 4000ms linear';prog2.style.width='100%';},30);
  },600);
},DELAY+50);
};


</script></body></html>
