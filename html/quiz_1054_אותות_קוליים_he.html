.opt.correct{background:#0d3d2a;border-color:#2ecc71;color:#2ecc71}

.opt.wrong{background:#3d1a1a;border-color:#e74c3c;color:#e74c3c}

  <g transform="translate(180,158) scale(0.714) translate(-180,-158)"><rect x="-58.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.40s" dur="0.05s" fill="freeze"/></rect><text x="-30.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="0.40s" dur="0.05s" fill="freeze"/></text><rect x="12.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.40s" dur="0.05s" fill="freeze"/></rect><text x="40.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="3.40s" dur="0.05s" fill="freeze"/></text><rect x="82.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="6.40s" dur="0.05s" fill="freeze"/></rect><text x="110.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="6.40s" dur="0.05s" fill="freeze"/></text><rect x="152.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="9.40s" dur="0.05s" fill="freeze"/></rect><text x="180.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="9.40s" dur="0.05s" fill="freeze"/></text><rect x="222.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="12.40s" dur="0.05s" fill="freeze"/></rect><text x="250.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="12.40s" dur="0.05s" fill="freeze"/></text><rect x="292.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="15.40s" dur="0.05s" fill="freeze"/></rect><text x="320.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="15.40s" dur="0.05s" fill="freeze"/></text><rect x="362.0" y="149.0" width="56" height="18" rx="3" fill="#e74c3c" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="18.40s" dur="0.05s" fill="freeze"/></rect><text x="390.0" y="180.0" text-anchor="middle" fill="#e74c3c" font-size="9" font-family="Heebo,sans-serif" opacity="0">ארוכה<animate attributeName="opacity" from="0" to="1" begin="18.40s" dur="0.05s" fill="freeze"/></text></g>
      <g id="ov" opacity="0">
        <rect x="60" y="8" width="240" height="38" rx="19" fill="#0d3d2a" stroke="#2ecc71" stroke-width="2" opacity="0.95"/>
        <text id="ovText" x="180" y="32" text-anchor="middle" fill="#2ecc71" font-size="20" font-family="Heebo,sans-serif" font-weight="900">✅ נכון!</text>

    <div id="prog"></div>

  <div id="ftr">
    <div class="ql" id="ql">❓ השאלה</div>
    <div class="qt" id="qt">כלי שייט בטווח ראייתך – משמיע 7 צפירות ארוכות ברצף, מה פירוש האות?</div>
    <div class="opts" id="opts"><div class="opt" id="o0"><div class="ltr">א</div>שהוא במצוקה.</div><div class="opt" id="o1"><div class="ltr">ב</div>שפעולותיך אינן מובנות לו.</div><div class="opt" id="o2"><div class="ltr">ג</div>שהוא בתנועה אחורה.</div><div class="opt" id="o3"><div class="ltr">ד</div>כנראה אין תקלה, לא קיימת צפירה כזאת.</div></div>
  </div>
</div>
<script>
const C=3;
const OPTS=["א. שהוא במצוקה.","ב. שפעולותיך אינן מובנות לו.","ג. שהוא בתנועה אחורה.","ד. כנראה אין תקלה, לא קיימת צפירה כזאת."];
const Q="כלי שייט בטווח ראייתך – משמיע 7 צפירות ארוכות ברצף, מה פירוש האות?";
const E="זו שאלת מלכודת ואין בה אות אמיתי. אות הסכנה לפי כלל 34(ד) הוא חמש צפירות קצרות ומהירות לפחות, ולא צפירות ארוכות. אל תבלבל: שבע צפירות קצרות ואחריהן צפירה אחת ארוכה הוא אות הנטישה הכללי על סיפון אונייה, וגם הוא קצרות ולא ארוכות. רצף של שבע צפירות ארוכות אינו קיים בכללים כלל. תשובה ב מתארת את אות הסכנה שהוא חמש קצרות. תשובה ג מתארת תנועה לאחור שהיא שלוש צפירות קצרות. תשובה א ממציאה אות מצוקה שאינו קיים.";
const LT=["א","ב","ג","ד"];

// AUTO-PLAY MODE — countdown then reveal (for screen recording)
// Gated behind window.__startAutoPlay() instead of running on page load, so the
// recorder (Puppeteer) can fire it the instant the screencast actually starts —
// otherwise the timer head-starts before recording begins and drifts out of sync
// with the audio track (which assumes recording-start == t=0).
window.__startAutoPlay = function(){
const prog=document.getElementById('prog');
const DELAY=15000;
prog.style.transition='none';prog.style.width='0%';
setTimeout(()=>{prog.style.transition='width '+DELAY+'ms linear';prog.style.width='100%';},30);
setTimeout(()=>{
  document.querySelectorAll('.opt').forEach((o,j)=>{
    o.style.transition='all 0.6s';
    if(j===C)o.classList.add('correct'); else o.classList.add('dim');
  });
  const ov=document.getElementById('ov');
  const txt=document.getElementById('ovText');
  const rect=ov.querySelector('rect');
  txt.textContent='✅ תשובה נכונה!';txt.setAttribute('fill','#2ecc71');
  rect.setAttribute('fill','#0d3d2a');rect.setAttribute('stroke','#2ecc71');
  ov.setAttribute('opacity','1');
  setTimeout(()=>{
    document.getElementById('ql').textContent='✅ התשובה הנכונה:';
    document.getElementById('qt').innerHTML='<span style="color:#2ecc71;font-size:11px;font-weight:900">'+OPTS[C]+'</span>'+(E?'<br><span style="color:#aac4e8;font-size:10px;font-weight:400">'+E+'</span>':'');
    // Second countdown — next card (loop for batch recording)
    const prog2=document.getElementById('prog');
    prog2.style.transition='none';prog2.style.width='0%';
    setTimeout(()=>{prog2.style.transition='width 4000ms linear';prog2.style.width='100%';},30);
  },600);
},DELAY+50);
};


// ── Sound signal audio ──────────────────────────────────────────────────────
const _BP=["L","L","L","L","L","L","L"];
const _BD={L:2,S:1},_BG=1;
let _played=false;
function _playBlasts(){
  if(_played)return;_played=true;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    let t=ctx.currentTime+0.4;
    _BP.forEach(b=>{
      const dur=_BD[b];
      [[150,0.50],[300,0.22],[450,0.10],[600,0.05]].forEach(([f,a])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sawtooth';o.frequency.value=f;
        g.gain.setValueAtTime(0.001,t);
        g.gain.linearRampToValueAtTime(a,t+0.04);
        g.gain.setValueAtTime(a,t+dur-0.07);
        g.gain.linearRampToValueAtTime(0.001,t+dur);
        o.connect(g);g.connect(ctx.destination);
        o.start(t);o.stop(t+dur+0.05);
      });
      t+=dur+_BG;
    });
  }catch(e){_played=false;}
}
// Autoplay on load; retry on first click if browser blocks
window.addEventListener('load',()=>setTimeout(_playBlasts,350));
document.addEventListener('click',()=>{_played=false;_playBlasts();},{once:true});

</script></body></html>
