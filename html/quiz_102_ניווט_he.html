<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8">
<title>Skipper Quiz #102 — ניווט</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
#reel{width:390px;height:625px;background:#0c1a3a;overflow:hidden;position:relative;display:flex;flex-direction:column;font-family:'Heebo',sans-serif;direction:rtl}
#hdr{background:#0c1a3a;padding:14px 16px 10px;flex-shrink:0;border-bottom:2px solid #1e3a6e;text-align:center}
.brand{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.htitle{color:#fff;font-size:18px;font-weight:900}
#scene{flex:1;position:relative;overflow:hidden}
#ftr{background:#0c1a3a;padding:12px 16px;flex-shrink:0;border-top:2px solid #1e3a6e}
.ql{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.qt{color:#fff;font-size:13px;font-weight:700;line-height:1.4;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{background:#1a2f5e;border:1px solid #2a4a8a;border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all 0.5s}
.ltr{background:#0c1a3a;color:#7eb8f7;font-size:11px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.opt.correct{background:#0d3d2a;border-color:#2ecc71;color:#2ecc71}
.opt.correct .ltr{background:#2ecc71;color:#0d3d2a}
.opt.wrong{background:#3d1a1a;border-color:#e74c3c;color:#e74c3c}
.opt.wrong .ltr{background:#e74c3c;color:#fff}
.opt.dim{opacity:0.3}
#prog{position:absolute;bottom:0;left:0;height:2px;background:#4a90d9;width:0;z-index:5}
</style></head><body>
<div id="reel">
  <div id="hdr"><div class="brand">⚓ SKIPPER QUIZ</div><div class="htitle">מבחן הסקיפר היומי של אלכס ארגוב</div></div>
  <div id="scene">
    
    <svg width="100%" height="100%" viewBox="0 0 360 420" preserveAspectRatio="xMidYMid slice" style="">
      
  <circle cx="48" cy="20" r="1" fill="white" opacity=".5"/>
  <circle cx="320" cy="35" r="1.2" fill="white" opacity=".6"/>
  <!-- Sun + rays, fixed on the right -->
  <g>
    <circle cx="350" cy="210" r="34" fill="#f1c40f"/>
    <circle cx="350" cy="210" r="46" fill="#f1c40f" opacity=".18"/>
    <line x1="296.1" y1="193.3" x2="284.7" y2="197.1" stroke="#f1c40f" stroke-width="2" opacity=".7"/><line x1="291.6" y1="201.1" x2="281.2" y2="203.2" stroke="#f1c40f" stroke-width="2" opacity=".7"/><line x1="290.0" y1="210.0" x2="280.0" y2="210.0" stroke="#f1c40f" stroke-width="2" opacity=".7"/><line x1="291.6" y1="218.9" x2="281.2" y2="216.8" stroke="#f1c40f" stroke-width="2" opacity=".7"/><line x1="296.1" y1="226.7" x2="284.7" y2="222.9" stroke="#f1c40f" stroke-width="2" opacity=".7"/>
  </g>
  <!-- Earth: lit (day) hemisphere + dark (night) hemisphere split by terminator -->
  <defs><clipPath id="earthClip"><circle cx="180" cy="210" r="135"/></clipPath></defs>
  <circle cx="180" cy="210" r="135" fill="#7eb8f7"/>
  <path d="M180,75 A135,135 0 0,0 180,345 Z" fill="#04102a"/>
  <!-- Continents drifting west→east across the globe's own face, simulating its rotation -->
  <g clip-path="url(#earthClip)">
    <ellipse cx="45" cy="180" rx="30" ry="18" fill="#2ecc71" opacity="0">
      <animate attributeName="cx" values="45;315" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.15;0.85;1" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="45" cy="240" rx="22" ry="15" fill="#27ae60" opacity="0">
      <animate attributeName="cx" values="45;315" begin="-2s" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.15;0.85;1" begin="-2s" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="45" cy="210" rx="18" ry="24" fill="#2ecc71" opacity="0">
      <animate attributeName="cx" values="45;315" begin="-4s" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.15;0.85;1" begin="-4s" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <line x1="180" y1="75" x2="180" y2="345" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,4" opacity=".5"/>
  <text x="223" y="218" text-anchor="middle" fill="#0a1a30" font-size="12" font-family="Heebo,sans-serif" font-weight="700">יום</text>
  <text x="137" y="218" text-anchor="middle" fill="#7eb8f7" font-size="12" font-family="Heebo,sans-serif" font-weight="700">לילה</text>
  <text x="223" y="92" text-anchor="middle" fill="#f1c40f" font-size="10" font-family="Heebo,sans-serif" font-weight="700">זריחה</text>
  <text x="137" y="332" text-anchor="middle" fill="#7eb8f7" font-size="10" font-family="Heebo,sans-serif" font-weight="700">שקיעה</text>
  <text x="180" y="398" text-anchor="middle" fill="#4a8ac0" font-size="10" font-family="Heebo,sans-serif">סיבוב כדור הארץ ממערב למזרח</text>

      <g id="ov" opacity="0">
        <rect x="60" y="8" width="240" height="38" rx="19" fill="#0d3d2a" stroke="#2ecc71" stroke-width="2" opacity="0.95"/>
        <text id="ovText" x="180" y="32" text-anchor="middle" fill="#2ecc71" font-size="20" font-family="Heebo,sans-serif" font-weight="900">✅ נכון!</text>
      </g>
      <text x="180" y="345" text-anchor="middle" fill="#7eb8f7" font-size="9" font-family="Arial" opacity=".85">⚓ Alex Argov | Sailing Instructor</text>
    </svg>
    <div id="prog"></div>
  </div>
  <div id="ftr">
    <div class="ql" id="ql">❓ השאלה</div>
    <div class="qt" id="qt">מדוע רואים את השמש זורחת במזרח ושוקעת במערב?</div>
    <div class="opts" id="opts"><div class="opt" id="o0"><div class="ltr">א</div>כדור הארץ נע במהירות מערבה סביב השמש</div><div class="opt" id="o1"><div class="ltr">ב</div>כדור הארץ סובב סביב צירו ממערב למזרח</div><div class="opt" id="o2"><div class="ltr">ג</div>ציר רוחבי של כדור הארץ מבצע תנועה מעגלית סביב כוכב הצפון</div><div class="opt" id="o3"><div class="ltr">ד</div>כדור הארץ סובב סביב צירו ממזרח למערב</div></div>
  </div>
</div>
<script>
const C=1;
const OPTS=["א. כדור הארץ נע במהירות מערבה סביב השמש","ב. כדור הארץ סובב סביב צירו ממערב למזרח","ג. ציר רוחבי של כדור הארץ מבצע תנועה מעגלית סביב כוכב הצפון","ד. כדור הארץ סובב סביב צירו ממזרח למערב"];
const Q="מדוע רואים את השמש זורחת במזרח ושוקעת במערב?";
const E="כדור הארץ מסתובב ממערב למזרח — לכן השמש נראית זורחת במזרח ושוקעת במערב.";
const LT=["א","ב","ג","ד"];

// AUTO-PLAY MODE — countdown then reveal (for screen recording)
// Gated behind window.__startAutoPlay() instead of running on page load, so the
// recorder (Puppeteer) can fire it the instant the screencast actually starts —
// otherwise the timer head-starts before recording begins and drifts out of sync
// with the audio track (which assumes recording-start == t=0).
window.__startAutoPlay = function(){
const prog=document.getElementById('prog');
const DELAY=15000;
prog.style.transition='none';prog.style.width='0%';
setTimeout(()=>{prog.style.transition='width '+DELAY+'ms linear';prog.style.width='100%';},30);
setTimeout(()=>{
  document.querySelectorAll('.opt').forEach((o,j)=>{
    o.style.transition='all 0.6s';
    if(j===C)o.classList.add('correct'); else o.classList.add('dim');
  });
  const ov=document.getElementById('ov');
  const txt=document.getElementById('ovText');
  const rect=ov.querySelector('rect');
  txt.textContent='✅ תשובה נכונה!';txt.setAttribute('fill','#2ecc71');
  rect.setAttribute('fill','#0d3d2a');rect.setAttribute('stroke','#2ecc71');
  ov.setAttribute('opacity','1');
  setTimeout(()=>{
    document.getElementById('ql').textContent='✅ התשובה הנכונה:';
    document.getElementById('qt').innerHTML='<span style="color:#2ecc71;font-size:11px;font-weight:900">'+OPTS[C]+'</span>'+(E?'<br><span style="color:#aac4e8;font-size:10px;font-weight:400">'+E+'</span>':'');
    // Second countdown — next card (loop for batch recording)
    const prog2=document.getElementById('prog');
    prog2.style.transition='none';prog2.style.width='0%';
    setTimeout(()=>{prog2.style.transition='width 4000ms linear';prog2.style.width='100%';},30);
  },600);
},DELAY+50);
};


</script></body></html>
