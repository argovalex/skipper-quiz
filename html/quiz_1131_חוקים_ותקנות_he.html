<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8">
<title>Skipper Quiz #1131 — חוקים ותקנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
#reel{width:390px;height:625px;background:#0c1a3a;overflow:hidden;position:relative;display:flex;flex-direction:column;font-family:'Heebo',sans-serif;direction:rtl}
#hdr{background:#0c1a3a;padding:14px 16px 10px;flex-shrink:0;border-bottom:2px solid #1e3a6e;text-align:center}
.brand{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.htitle{color:#fff;font-size:18px;font-weight:900}
#scene{flex:1;position:relative;overflow:hidden}
#ftr{background:#0c1a3a;padding:12px 16px;flex-shrink:0;border-top:2px solid #1e3a6e}
.ql{color:#7eb8f7;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.qt{color:#fff;font-size:13px;font-weight:700;line-height:1.4;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{background:#1a2f5e;border:1px solid #2a4a8a;border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all 0.5s}
.ltr{background:#0c1a3a;color:#7eb8f7;font-size:11px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.opt.correct{background:#0d3d2a;border-color:#2ecc71;color:#2ecc71}
.opt.correct .ltr{background:#2ecc71;color:#0d3d2a}
.opt.wrong{background:#3d1a1a;border-color:#e74c3c;color:#e74c3c}
.opt.wrong .ltr{background:#e74c3c;color:#fff}
.opt.dim{opacity:0.3}
#prog{position:absolute;bottom:0;left:0;height:2px;background:#4a90d9;width:0;z-index:5}
</style></head><body>
<div id="reel">
  <div id="hdr"><div class="brand">⚓ SKIPPER QUIZ</div><div class="htitle">מבחן הסקיפר היומי של אלכס ארגוב</div></div>
  <div id="scene">
    
    <svg width="100%" height="100%" viewBox="0 0 360 420" preserveAspectRatio="xMidYMid slice" style="">
      
  <rect width="360" height="420" fill="#0a1428"/>
  <text x="180" y="130" text-anchor="middle" fill="#fff" font-size="16" font-family="Heebo,sans-serif" font-weight="900">מסמכים ובדיקה תקופתית</text>

  <text x="180" y="156" text-anchor="middle" fill="#7eb8f7" font-size="11.5" font-family="Heebo,sans-serif" font-weight="700">חובה לשאת בהפלגה</text>
  <path d="M262.75,176 L266.95,180.2 L274.3,170.75"
    fill="none" stroke="#2ecc71" stroke-width="3.1500000000000004" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="168" y="180" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="Heebo,sans-serif" font-weight="700">תעודת משיט</text>
  <path d="M262.75,198 L266.95,202.2 L274.3,192.75"
    fill="none" stroke="#2ecc71" stroke-width="3.1500000000000004" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="168" y="202" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="Heebo,sans-serif" font-weight="700">רשיון כלי השיט</text>
  <path d="M262.75,220 L266.95,224.2 L274.3,214.75"
    fill="none" stroke="#2ecc71" stroke-width="3.1500000000000004" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="168" y="224" text-anchor="middle" fill="#2ecc71" font-size="12" font-family="Heebo,sans-serif" font-weight="700">תעודת ביטוח</text>

  <rect x="46" y="238" width="268" height="34" rx="8" fill="#2a1010" stroke="#e74c3c" stroke-width="2"/>
  <g stroke="#e74c3c" stroke-width="3.4499999999999997" stroke-linecap="round">
    <path d="M284.25,249.25 L295.75,260.75"/>
    <path d="M295.75,249.25 L284.25,260.75"/></g>
  <text x="164" y="260" text-anchor="middle" fill="#e74c3c" font-size="12.5" font-family="Heebo,sans-serif" font-weight="900">רשימת ציוד הצלה לא נדרשת</text>

  <!-- the periodic inspection, badge and label side by side so neither sits on
       top of the other -->
  <g transform="translate(268,304)">
    <circle r="24" fill="none" stroke="#f39c12" stroke-width="3"/>
    <text y="-1" text-anchor="middle" fill="#f39c12" font-size="16" font-family="Heebo,sans-serif" font-weight="900">2</text>
    <text y="13" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Heebo,sans-serif" font-weight="700">שנים</text>
  </g>
  <text x="146" y="300" text-anchor="middle" fill="#f39c12" font-size="12" font-family="Heebo,sans-serif" font-weight="700">בדיקת כושר שייט</text>
  <text x="146" y="316" text-anchor="middle" fill="#f39c12" font-size="12" font-family="Heebo,sans-serif" font-weight="700">אחת ל</text>

      <g id="ov" opacity="0">
        <rect x="60" y="8" width="240" height="38" rx="19" fill="#0d3d2a" stroke="#2ecc71" stroke-width="2" opacity="0.95"/>
        <text id="ovText" x="180" y="32" text-anchor="middle" fill="#2ecc71" font-size="20" font-family="Heebo,sans-serif" font-weight="900">✅ נכון!</text>
      </g>
      <text x="180" y="345" text-anchor="middle" fill="#7eb8f7" font-size="12" font-family="Heebo,sans-serif" font-weight="700" opacity="1">⚓ Alex Argov | Sailing Instructor</text>
    </svg>
    <div id="prog"></div>
  </div>
  <div id="ftr">
    <div class="ql" id="ql">❓ השאלה</div>
    <div class="qt" id="qt">איזה מסמך לא חייבים לשאת בעת הפלגה על אופנוע ים?</div>
    <div class="opts" id="opts"><div class="opt" id="o0"><div class="ltr">א</div>רשיון שייט.</div><div class="opt" id="o1"><div class="ltr">ב</div>תעודת מזהה.</div><div class="opt" id="o2"><div class="ltr">ג</div>תעודה משיט.</div><div class="opt" id="o3"><div class="ltr">ד</div>רשימת ציוד הצלה.</div></div>
  </div>
</div>
<script>
const C=3;
const OPTS=["א. רשיון שייט.","ב. תעודת מזהה.","ג. תעודה משיט.","ד. רשימת ציוד הצלה."];
const Q="איזה מסמך לא חייבים לשאת בעת הפלגה על אופנוע ים?";
const E="רשימת ציוד הצלה אינה מסמך שחובה לשאת בעת הפלגה.";
const LT=["א","ב","ג","ד"];

// AUTO-PLAY MODE — countdown then reveal (for screen recording)
// Gated behind window.__startAutoPlay() instead of running on page load, so the
// recorder (Puppeteer) can fire it the instant the screencast actually starts —
// otherwise the timer head-starts before recording begins and drifts out of sync
// with the audio track (which assumes recording-start == t=0).
window.__startAutoPlay = function(){
const prog=document.getElementById('prog');
const DELAY=15000;
prog.style.transition='none';prog.style.width='0%';
setTimeout(()=>{prog.style.transition='width '+DELAY+'ms linear';prog.style.width='100%';},30);
setTimeout(()=>{
  document.querySelectorAll('.opt').forEach((o,j)=>{
    o.style.transition='all 0.6s';
    if(j===C)o.classList.add('correct'); else o.classList.add('dim');
  });
  const ov=document.getElementById('ov');
  const txt=document.getElementById('ovText');
  const rect=ov.querySelector('rect');
  txt.textContent='✅ תשובה נכונה!';txt.setAttribute('fill','#2ecc71');
  rect.setAttribute('fill','#0d3d2a');rect.setAttribute('stroke','#2ecc71');
  ov.setAttribute('opacity','1');
  setTimeout(()=>{
    document.getElementById('ql').textContent='✅ התשובה הנכונה:';
    document.getElementById('qt').innerHTML='<span style="color:#2ecc71;font-size:11px;font-weight:900">'+OPTS[C]+'</span>'+(E?'<br><span style="color:#aac4e8;font-size:10px;font-weight:400">'+E+'</span>':'');
    // Second countdown — next card (loop for batch recording)
    const prog2=document.getElementById('prog');
    prog2.style.transition='none';prog2.style.width='0%';
    setTimeout(()=>{prog2.style.transition='width 4000ms linear';prog2.style.width='100%';},30);
  },600);
},DELAY+50);
};


</script></body></html>
